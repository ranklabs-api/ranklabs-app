# SearchOps Site Configuration
site:
  name: ""
  description: ""
  domain: ""
  
branding:
  logo: "/assets/images/logo.png"
  primary_color: "#2563eb"
  secondary_color: "#1e40af"
  font_family: "Inter, sans-serif"

seo:
  title_template: "{page_title} | {site_name}"
  meta_description: ""
  keywords: []
  og_image: "/assets/images/og-default.png"
